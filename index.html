<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLab360 - Premium Parts Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #1e272e; 
            --accent: #05c46b; 
            --price: #eb4d4b; 
            --bg: #f1f2f6; 
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            padding-bottom: 75px; /* বটম নেভিগেশনের জন্য নিচে স্পেস */
        }
        
        /* 🔝 প্রিমিয়াম হেডার */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 20px 15px; 
            text-align: center; 
            border-bottom: 3px solid var(--accent);
        }
        .logo-container img { 
            max-width: 65px; 
            height: auto; 
            filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.3)); 
        }
        header h1 { margin: 5px 0 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        header p { margin: 2px 0 0; font-size: 12px; opacity: 0.8; }
        
        /* 📄 পেজ অ্যাক্টিভেশন স্টাইল */
        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🎪 ১. ব্যানার স্লাইডার (২টি ব্যানারের জন্য পারফেক্ট সাইজ) */
        .slider-container {
            width: 100%;
            max-width: 800px;
            margin: 12px auto;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }
        .slider {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 200%; /* ২টি ব্যানারের জন্য ২০০% */
        }
        .slide {
            width: 50%; /* প্রতিটি ব্যানার ৫০% জায়গা নিবে */
            flex-shrink: 0;
        }
        .slide img {
            width: 100%;
            height: auto;
            aspect-ratio: 1200/525; /* আপনার তৈরি করা ইমেজের রেশিও */
            object-fit: cover;
            display: block;
        }

        /* 🔘 ২. পাস্টার গোল ক্যাটাগরি গ্রিড (Nur Telecom Style) */
        .section-title {
            font-size: 16px;
            color: var(--primary);
            margin: 20px 15px 10px;
            font-weight: 700;
            border-left: 4px solid var(--accent);
            padding-left: 8px;
        }
        .category-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 15px;
            scroll-behavior: smooth;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            min-width: 75px;
        }
        .cat-item .circle-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: white;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            transition: 0.2s;
            overflow: hidden;
        }
        .cat-item:hover .circle-img, .cat-item.active .circle-img { border-color: var(--accent); transform: scale(1.05); }
        .cat-item .circle-img img { width: 70%; height: 70%; object-fit: contain; }
        .cat-item span { font-size: 12px; font-weight: 600; color: #485460; margin-top: 6px; white-space: nowrap; }

        /* 🛒 শপ পেজ ও সার্চ বার */
        .controls-container { max-width: 800px; margin: 15px auto; padding: 0 15px; }
        #searchBar { 
            width: 100%; 
            padding: 12px 20px; 
            border-radius: 50px; 
            border: 1px solid #e0e0e0; 
            box-shadow: var(--card-shadow); 
            font-size: 15px; 
            outline: none; 
            box-sizing: border-box;
            transition: 0.3s;
        }
        #searchBar:focus { border-color: var(--accent); box-shadow: 0 4px 15px rgba(5,196,107,0.1); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 10px 15px 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; }
        
        /* 📦 প্রফেশনাল প্রোডাক্ট কার্ড */
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 12px; 
            box-shadow: var(--card-shadow); 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            box-sizing: border-box; 
            position: relative;
        }
        .card img { width: 100%; height: 130px; object-fit: contain; border-radius: 8px; background: #fafafa; margin-bottom: 10px; }
        .card h3 { font-size: 13px; color: #2c3e50; margin: 5px 0; min-height: 36px; line-height: 1.4; font-weight: 600; text-align: left; }
        .card .price { color: var(--price); font-size: 16px; font-weight: 700; margin-bottom: 10px; display: block; text-align: left; }
        
        .order-btn { 
            background: #05c46b; 
            color: white; 
            border: none;
            padding: 10px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: 0.2s;
        }
        .order-btn:hover { background: #04a75b; }

        /* 📱 ৩. বটম নেভিগেশন বার (Bottom Navigation Bar) */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.08);
            z-index: 999;
        }
        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        /* 🛍️ অর্ডার মডাল পপআপ */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 15px; box-sizing: border-box;
        }
        .modal-content {
