<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLab360 - Premium Parts Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --primary: #002c4b; --accent: #05c46b; --price: #eb4d4b; --bg: #f8fafc; --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 0; padding-bottom: 80px; }
        
        .top-notice { background: #eb4d4b; color: white; font-size: 13px; padding: 8px 0; overflow: hidden; white-space: nowrap; font-weight: 600; width: 100%; position: sticky; top: 0; z-index: 101; }
        
        /* ৬টি স্লাইডারের জন্য আপডেট করা ডিজাইন */
        .hero-section { position: relative; width: 100%; max-width: 800px; margin: 0 auto; overflow: hidden; box-shadow: var(--card-shadow); }
        .slider { display: flex; transition: transform 0.5s ease-in-out; width: 600%; }
        .slide { width: 16.666%; }
        .slide img { width: 100%; height: auto; display: block; object-fit: cover; }

        .brand-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; background: rgba(0, 0, 0, 0.45); padding: 15px 25px; border-radius: 16px; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2); min-width: 200px; }
        .brand-overlay img { max-width: 55px; height: auto; border-radius: 8px; margin-bottom: 5px; }
        .brand-overlay h1 { margin: 0; font-size: 24px; color: white; font-weight: bold; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
        .trust-badges { display: flex; justify-content: space-around; background: white; padding: 12px 5px; margin: 15px; border-radius: 8px; box-shadow: var(--card-shadow); }
        .badge-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #475569; }
        
        .section-title { font-size: 16px; color: var(--primary); margin: 20px 15px 10px; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 8px; text-align: left; }
        .category-scroll, .brand-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 15px; }
        .cat-item, .brand-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 70px; }
        .circle-icon { width: 55px; height: 55px; border-radius: 50%; background: white; box-shadow: var(--card-shadow); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--primary); }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 12px; box-shadow: var(--card-shadow); }
        .card img { width: 100%; height: 130px; object-fit: contain; }
        .order-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.06); z-index: 999; }
        .nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; width: 25%; }
        .nav-item.active { color: var(--accent); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="top-notice"><marquee scrollamount="4">🔥 অফার! যেকোনো পার্টস অর্ডারের পূর্বে স্টক বা যেকোনো তথ্যের জন্য সরাসরি হোয়াটসঅ্যাপে মেসেজ দিন। 🔥</marquee></div>

<div id="homePage" class="page-content active">
    <div class="hero-section">
        <div class="brand-overlay">
            <img src="https://i.postimg.cc/Fsb0yxtT/20260519-200910-0000.jpg" alt="Logo">
            <h1>PhoneLab360</h1>
        </div>
        <div class="slider" id="slider">
            <div class="slide"><img src="https://i.postimg.cc/tJYm1mvf/1779200037853.png" alt="1"></div>
            <div class="slide"><img src="https://i.postimg.cc/QMGcX9cW/01878877746-20260519-141712-0000.jpg" alt="2"></div>
            <div class="slide"><img src="https://i.postimg.cc/qvnCZJSW/01878877746-20260519-140907-0000.jpg" alt="3"></div>
            <div class="slide"><img src="https://i.postimg.cc/ZRRWX1qY/01878877746-20260519-212654-0000.jpg" alt="4"></div>
            <div class="slide"><img src="https://i.postimg.cc/1zz6ZgW2/01878877746-20260519-212303-0000.jpg" alt="5"></div>
            <div class="slide"><img src="https://i.postimg.cc/GhQHhLsw/01878877746-20260519-212254-0000.jpg" alt="6"></div>
        </div>
    </div>
    
    <div class="trust-badges">
        <div class="badge-item"><i class="fa-solid fa-truck-fast"></i> ফাস্ট ডেলিভারি</div>
        <div class="badge-item"><i class="fa-solid fa-shield-halved"></i> ১০০% অরিজিনাল</div>
    </div>
    
    <div class="product-grid" id="home-products"></div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i>হোম</button>
    <a href="https://wa.me/8801878877746" target="_blank" class="nav-item"><i class="fa-brands fa-whatsapp"></i>হেল্প</a>
</div>

<script>
    // ৬টি ছবির জন্য স্লাইডার লজিক
    let currentSlide = 0;
    setInterval(() => {
        const slider = document.getElementById('slider');
        currentSlide = (currentSlide + 1) % 6; 
        slider.style.transform = `translateX(-${currentSlide * 16.666}%)`;
    }, 3000);

    function switchTab(tab) {
        document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
        document.getElementById(tab + 'Page').style.display = 'block';
    }
</script>

</body>
</html>
