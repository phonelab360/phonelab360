<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLab360 - Premium Parts Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --primary: #002c4b; 
            --accent: #05c46b; 
            --price: #eb4d4b; 
            --bg: #f8fafc; 
        }
        * { box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .top-notice { background: #eb4d4b; color: white; font-size: 13px; padding: 8px 0; font-weight: 600; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        .controls-container { max-width: 800px; margin: 15px auto; padding: 0 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        #searchBar { flex: 1; padding: 12px 20px; border-radius: 50px; border: 1px solid #cbd5e1; font-size: 14px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-img-wrapper { height: 130px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 8px; position: relative; overflow: hidden; }
        .card img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .price { color: var(--price); font-size: 16px; font-weight: 700; margin: 8px 0; }
        .order-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; flex: 1; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 999; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="top-notice">
        <marquee>🔥 অফার! যেকোনো তথ্যের জন্য হোয়াটসঅ্যাপ করুন - 01878-877746</marquee>
    </div>
    <h1>PhoneLab360</h1>
</header>

<div id="shopPage" class="page-content active">
    <div class="controls-container">
        <input type="text" id="searchBar" list="product-list" placeholder="প্রোডাক্ট সার্চ করুন..." onkeyup="filterProducts()">
        
        <select id="sortSelect" onchange="filterProducts()" style="padding:10px; border-radius:8px;">
            <option value="default">সাধারণ</option>
            <option value="priceLow">দাম কম → বেশি</option>
            <option value="priceHigh">দাম বেশি → কম</option>
        </select>
    </div>

    <datalist id="product-list"></datalist>

    <div class="product-grid" id="shop-products"></div>
</div>

<script>
    let productsData = [];
    let activeCat = 'All';
    let activeBrand = 'All';

    const supabaseClient = supabase.createClient(
        'https://rohbfyqbpxmhwkjljqdw.supabase.co', 
        'sb_publishable_eoFc3VezZHglCNWDJ1zjcA_dDmQsZ9V'
    );

    function renderGrids(data) {
        const sortType = document.getElementById('sortSelect').value;
        let sorted = [...data];

        if (sortType === 'priceLow') sorted.sort((a,b) => a.price - b.price);
        if (sortType === 'priceHigh') sorted.sort((a,b) => b.price - a.price);

        const html = sorted.map(p => `
            <div class="card">
                <div class="card-img-wrapper">
                    <img src="\( {p.image || 'https://via.placeholder.com/150'}" alt=" \){p.name}">
                    <button onclick="toggleWishlist('${p.name}')" style="position:absolute;top:8px;right:8px;background:none;border:none;font-size:20px;cursor:pointer;">❤️</button>
                </div>
                <h3>${p.name}</h3>
                <span class="price">৳ ${Number(p.price).toLocaleString('bn-BD')}</span>
                <div style="display:flex; gap:6px; margin-top:8px;">
                    <button onclick="openModal('${p.name}', ${p.price})" class="order-btn">অর্ডার করুন</button>
                    <a href="https://wa.me/8801878877746?text=${encodeURIComponent('আমি এই প্রোডাক্টটি কিনতে চাই: ' + p.name)}" 
                       target="_blank" style="background:#25D366;color:white;padding:10px 12px;border-radius:8px;text-decoration:none;">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                </div>
            </div>
        `).join('');

        document.getElementById('shop-products').innerHTML = html || '<p style="text-align:center;padding:40px;color:gray;">কোনো প্রোডাক্ট পাওয়া যায়নি</p>';
    }

    function filterProducts() {
        const search = document.getElementById('searchBar').value.toLowerCase();
        const filtered = productsData.filter(p => 
            p.name.toLowerCase().includes(search)
        );
        renderGrids(filtered);
    }

    function toggleWishlist(name) {
        alert(name + " উইশলিস্টে যোগ হয়েছে ❤️");
    }

    function openModal(name, price) {
        alert(`অর্ডার মডাল খুলছে:\n\( {name} - ৳ \){price}\n\n(আপনার মডাল কোড এখানে যোগ করুন)`);
    }

    // লোড প্রোডাক্ট
    async function loadProducts() {
        try {
            const { data, error } = await supabaseClient.from('products').select('*');
            if (data) {
                productsData = data;
                renderGrids(data);
            }
        } catch(e) {
            console.error(e);
            document.getElementById('shop-products').innerHTML = "<p style='text-align:center;padding:30px;'>প্রোডাক্ট লোড করতে সমস্যা হয়েছে</p>";
        }
    }

    window.onload = loadProducts;
</script>
</body>
</html>
