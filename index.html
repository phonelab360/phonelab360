<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLab360 - Official Parts Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1e272e; --accent: #05c46b; --price: #eb4d4b; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* Header */
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Search & Filter Section */
        .controls-container { max-width: 800px; margin: -25px auto 30px; padding: 0 15px; text-align: center; }
        #searchBar { width: 100%; padding: 15px 25px; border-radius: 50px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.1); font-size: 16px; outline: none; margin-bottom: 20px; }
        
        .filter-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .filter-btn { background: white; border: 1px solid #ddd; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 60vh; }
        
        /* Product Card */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; background: #f9f9f9; }
        .card h3 { font-size: 18px; color: #2d3436; margin: 10px 0; min-height: 44px; }
        .card .price { color: var(--price); font-size: 22px; font-weight: bold; margin-bottom: 20px; display: block; }
        
        .wa-btn { background: #2ecc71; color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; margin-top: auto; }
        .wa-btn:hover { background: #27ae60; }

        /* Footer */
        footer { background: var(--primary); color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
        .footer-content { max-width: 1200px; margin: 0 auto; }
        .footer-links a { color: #05c46b; text-decoration: none; margin: 0 10px; }
        .copy-right { margin-top: 20px; font-size: 14px; opacity: 0.7; }

        #loading { text-align: center; padding: 50px; font-size: 18px; color: #7f8c8d; }
    </style>
</head>
<body>

<header>
    <h1>PhoneLab360</h1>
    <p>আপনার ফোনের বিশ্বস্ত পার্টস শপ</p>
</header>

<div class="controls-container">
    <input type="text" id="searchBar" placeholder="কি খুঁজছেন? (যেমন: Battery, Display...)" onkeyup="filterProducts()">
    
    <div class="filter-group">
        <button class="filter-btn active" onclick="filterByCategory('All', this)">সব পণ্য</button>
        <button class="filter-btn" onclick="filterByCategory('Battery', this)">ব্যাটারি</button>
        <button class="filter-btn" onclick="filterByCategory('Display', this)">ডিসপ্লে</button>
        <button class="filter-btn" onclick="filterByCategory('Tools', this)">টুলস</button>
        <button class="filter-btn" onclick="filterByCategory('Accessories', this)">অন্যান্য</button>
    </div>
</div>

<div class="container">
    <div id="loading">পণ্যগুলো সাজানো হচ্ছে...</div>
    <div class="product-grid" id="product-list"></div>
</div>

<footer>
    <div class="footer-content">
        <h3>PhoneLab360</h3>
        <p>আমরা প্রদান করি ১০০% কোয়ালিটি সম্পন্ন মোবাইল পার্টস।</p>
        <div class="footer-links">
            <a href="https://wa.me/8801878877746">সরাসরি যোগাযোগ</a> | 
            <a href="https://facebook.com/phonelab360">ফেসবুক পেজ</a>
        </div>
        <div class="copy-right">
            &copy; 2024 PhoneLab360 - সর্বস্বত্ব সংরক্ষিত।
        </div>
    </div>
</footer>

<script>
    const SUPABASE_URL = 'https://rohbfyqbpxmhwkjljqdw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_eoFc3VezZHglCNWDJ1zjcA_dDmQsZ9V'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const WHATSAPP_NUMBER = "8801878877746"; 
    let allProducts = [];
    let currentCategory = 'All';

    async function loadProducts() {
        try {
            const { data: products, error } = await supabaseClient.from('products').select('*');
            if (error) throw error;
            allProducts = products;
            displayProducts(products);
            document.getElementById('loading').style.display = 'none';
        } catch (err) {
            document.getElementById('loading').innerText = "পণ্য লোড করতে সমস্যা হচ্ছে।";
        }
    }

    function displayProducts(products) {
        const list = document.getElementById('product-list');
        if(products.length === 0) {
            list.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #999;">কোনো পণ্য খুঁজে পাওয়া যায়নি।</p>`;
            return;
        }
        list.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image || 'https://via.placeholder.com/300'}" alt="${p.name}">
                <h3>${p.name}</h3>
                <span class="price">৳ ${p.price}</span>
                <a href="https://wa.me/${WHATSAPP_NUMBER}?text=সালাম, আমি এই পণ্যটি নিতে চাই:%0Aনাম: ${p.name}%0Aদাম: ${p.price} টাকা" target="_blank" class="wa-btn">
                    WhatsApp অর্ডার
                </a>
            </div>
        `).join('');
    }

    function filterProducts() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(query);
            const matchesCategory = currentCategory === 'All' || (p.category && p.category === currentCategory);
            return matchesSearch && matchesCategory;
        });
        displayProducts(filtered);
    }

    function filterByCategory(category, btn) {
        currentCategory = category;
        
        // বাটন কালার পরিবর্তন
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        filterProducts();
    }

    window.onload = loadProducts;
</script>

</body>
</html>
