<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLab360 - Premium Parts Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #002c4b; --accent: #05c46b; --price: #eb4d4b; --bg: #f8fafc; --card-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        body { background: var(--bg); margin: 0; padding-bottom: 80px; font-family: 'Hind Siliguri', sans-serif; }
        
        /* নতুন ফিচারের জন্য CSS */
        .sorting-controls { display: flex; justify-content: center; gap: 10px; margin: 15px; }
        .fav-btn { position: absolute; top: 10px; right: 10px; border: none; background: #fff; cursor: pointer; font-size: 18px; }
        .share-btn { background: #25d366; color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 14px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 12px; box-shadow: var(--card-shadow); position: relative; }
        .card img { width: 100%; height: 120px; object-fit: contain; }
        .order-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="shopPage" class="page-content active">
    <div class="sorting-controls">
        <input type="text" id="searchBar" placeholder="সার্চ করুন..." onkeyup="filterAndSort()">
        <select id="sortSelect" onchange="filterAndSort()">
            <option value="default">নতুন</option>
            <option value="priceLow">কম দাম</option>
            <option value="priceHigh">বেশি দাম</option>
        </select>
    </div>

    <div class="product-grid" id="shop-products"></div>
</div>

<script>
    let productsData = [];

    // প্রোডাক্ট ফিল্টার ও শর্ট লজিক
    function filterAndSort() {
        const search = document.getElementById('searchBar').value.toLowerCase();
        const sortType = document.getElementById('sortSelect').value;

        let filtered = productsData.filter(p => p.name.toLowerCase().includes(search));

        if (sortType === 'priceLow') filtered.sort((a, b) => a.price - b.price);
        if (sortType === 'priceHigh') filtered.sort((a, b) => b.price - a.price);

        renderGrids(filtered);
    }

    // ফেভারিট লিস্ট লজিক (LocalStorage ব্যবহার করে)
    function toggleWishlist(name) {
        let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
        if (wishlist.includes(name)) {
            wishlist = wishlist.filter(item => item !== name);
        } else {
            wishlist.push(name);
        }
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        alert('আপনার ফেভারিট লিস্টে যুক্ত করা হয়েছে!');
    }

    // রেন্ডারিং লজিক
    function renderGrids(data) {
        const grid = document.getElementById('shop-products');
        grid.innerHTML = data.map(p => `
            <div class="card">
                <button class="fav-btn" onclick="toggleWishlist('${p.name}')">❤️</button>
                <img src="${p.image}" alt="${p.name}">
                <h3>${p.name}</h3>
                <span class="price">৳ ${p.price}</span>
                <button class="order-btn" onclick="openModal('${p.name}', '${p.price}')">অর্ডার করুন</button>
                <a href="https://wa.me/8801878877746?text=আমি নিতে চাই: ${p.name}" class="share-btn">হোয়াটসঅ্যাপে শেয়ার করুন</a>
            </div>
        `).join('');
    }

    // আগের বাকি লজিক এখানে যুক্ত করুন...
    // যেমন: getProducts(), openModal(), submitOrder() ইত্যাদি।
</script>

</body>
</html>
