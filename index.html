<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLab360 - Premium Parts Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --primary: #002c4b; 
            --accent: #05c46b; 
            --price: #eb4d4b; 
            --bg: #f8fafc; 
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 0; padding-bottom: 80px; }
        
        /* 📣 নোটিশ বার */
        .top-notice { background: #eb4d4b; color: white; font-size: 13px; padding: 8px 0; overflow: hidden; white-space: nowrap; font-weight: 600; width: 100%; position: sticky; top: 0; z-index: 101; }
        .top-notice marquee { vertical-align: middle; }

        /* 🎪 হিরো ব্যানার সেকশন */
        .hero-section { position: relative; width: 100%; max-width: 800px; margin: 0 auto; overflow: hidden; box-shadow: var(--card-shadow); }
        .slider { display: flex; transition: transform 0.5s ease-in-out; }
        .slide { flex-shrink: 0; width: 100%; }
        .slide img { width: 100%; height: 200px; display: block; object-fit: cover; }

        /* লোগো ওভারলে */
        .brand-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; z-index: 10; background: rgba(0, 0, 0, 0.45); 
            padding: 15px 25px; border-radius: 16px; backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2); min-width: 200px;
        }
        .brand-overlay img { max-width: 55px; height: auto; border-radius: 8px; margin-bottom: 5px; }
        .brand-overlay h1 { margin: 0; font-size: 24px; color: white; font-weight: bold; }
        
        /* পেজ কন্টেন্ট */
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* 🛡️ ট্রাস্ট ইনফো ব্যাজ */
        .trust-badges { display: flex; justify-content: space-around; background: white; padding: 12px 5px; margin: 15px; border-radius: 8px; box-shadow: var(--card-shadow); }
        .badge-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #475569; }
        .badge-item i { color: var(--accent); font-size: 14px; }

        /* 🔘 গোল ক্যাটাগরি ডিজাইন */
        .section-title { font-size: 16px; color: var(--primary); margin: 20px 15px 10px; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 8px; text-align: left; }
        .category-scroll, .brand-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 15px; }
        .category-scroll::-webkit-scrollbar, .brand-scroll::-webkit-scrollbar { display: none; }
        .cat-item, .brand-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 70px; }
        .cat-item .circle-icon, .brand-item .circle-icon { width: 55px; height: 55px; border-radius: 50%; background: white; box-shadow: var(--card-shadow); display: flex; align-items: center; justify-content: center; border: 2px solid transparent; font-size: 22px; color: var(--primary); transition: 0.2s; }
        .cat-item.active .circle-icon, .brand-item.active .circle-icon { border-color: var(--accent); color: var(--accent); }
        .cat-item span, .brand-item span { font-size: 12px; margin-top: 6px; font-weight: 600; color: #475569; }

        /* 🔍 সার্চ ও গ্রিড */
        .controls-container { max-width: 800px; margin: 15px auto; padding: 0 15px; }
        #searchBar { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1px solid #cbd5e1; font-size: 14px; box-shadow: var(--card-shadow); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        
        /* 📦 প্রোডাক্ট কার্ড */
        .card { background: white; border-radius: 12px; padding: 12px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; height: 100%; }
        .card-img-wrapper { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 8px; overflow: hidden; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card h3 { font-size: 13px; color: #1e293b; margin: 10px 0 3px; min-height: 38px; }
        .card .price { color: var(--price); font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .order-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; margin-top: auto; }

        /* 📋 ট্র্যাক বক্স */
        .track-box { background: white; padding: 25px 20px; border-radius: 16px; box-shadow: var(--card-shadow); text-align: center; margin: 20px; border: 1px solid #e2e8f0; }
        .track-input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .track-result { margin-top: 20px; text-align: left; font-size: 14px; }

        /* 📱 বটম ন্যাভ বার */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.06); z-index: 999; }
        .nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; color: #94a3b8; cursor: pointer; width: 25%; }
        .nav-item.active { color: var(--accent); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="top-notice">
    <marquee scrollamount="4">🔥 অফার! যেকোনো পার্টস অর্ডারের পূর্বে স্টক চেক করুন। দেশজুড়ে দ্রুত ক্যাশ অন ডেলিভারি! 🔥</marquee>
</div>

<div class="hero-section">
    <div class="slider" id="slider">
        <div class="slide"><img src="https://i.postimg.cc/ZRRWX1qY/01878877746-20260519-212654-0000.jpg"></div>
        <div class="slide"><img src="https://i.postimg.cc/QMGcX9cW/01878877746-20260519-141712-0000.jpg"></div>
        <div class="slide"><img src="https://i.postimg.cc/qvnCZJSW/01878877746-20260519-140907-0000.jpg"></div>
    </div>
    <div class="brand-overlay">
        <img src="https://i.postimg.cc/Fsb0yxtT/20260519-200910-0000.jpg" alt="Logo">
        <h1>PhoneLab360</h1>
    </div>
</div>

</body>
</html>
